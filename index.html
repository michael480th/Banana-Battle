<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />

  <!-- iOS: allow "Add to Home Screen" fullscreen web app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Banana Battle" />
  <link rel="apple-touch-icon" href="icon.png" />

  <title>Banana Battle</title>
  <meta name="description" content="A retro artillery duel — lob bananas across a destructible pixel skyline. First to 3 wins. Play free in your browser." />

  <!-- Rich link previews when the game is shared (iMessage, socials) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Banana Battle 🍌" />
  <meta property="og:description" content="Lob bananas across a destructible pixel skyline. Think you can beat me? Tap to play free." />
  <meta property="og:image" content="https://michael480th.github.io/Banana-Battle/og-image.png" />
  <meta property="og:url" content="https://michael480th.github.io/Banana-Battle/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Banana Battle 🍌" />
  <meta name="twitter:description" content="Lob bananas across a destructible pixel skyline. Think you can beat me?" />
  <meta name="twitter:image" content="https://michael480th.github.io/Banana-Battle/og-image.png" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <main>
    <div id="stage">
      <canvas id="game" width="640" height="350"></canvas>
    </div>

    <section id="controls">
      <div id="status">PLAYER 1 &mdash; TAKE AIM</div>

      <label>
        <span class="lbl">ANGLE</span>
        <input id="angle" type="range" min="0" max="90" value="45" step="1" />
        <span id="angleValue" class="val">45&deg;</span>
      </label>

      <label>
        <span class="lbl">POWER</span>
        <input id="velocity" type="range" min="10" max="120" value="60" step="1" />
        <span id="velocityValue" class="val">60</span>
      </label>

      <div id="wind">WIND: 0</div>

      <div class="btnrow">
        <button id="throwButton">THROW</button>
        <button id="shareButton" class="hidden">📲 SHARE RESULT</button>
        <button id="newRoundButton">NEW ROUND</button>
      </div>

      <div id="kbhint">Keyboard: &larr;&rarr; angle &nbsp;&middot;&nbsp; &uarr;&darr; power &nbsp;&middot;&nbsp; Space to throw</div>
    </section>
  </main>

  <div id="toast" role="status" aria-live="polite"></div>

  <script src="game.js"></script>
</body>
</html>
